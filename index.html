<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vídeo IA Studio</title>
  <link rel="stylesheet" href="style.css?v=5" />
</head>
<body>
  <main class="app-shell">
    <section class="phone">
      <header class="topbar">
        <div>
          <p class="eyebrow" id="appState">IA pronta</p>
          <h1>Vídeo IA Studio</h1>
        </div>
        <button class="chip" id="languageBtn" type="button">PT-BR</button>
      </header>

      <section class="hero-card">
        <label for="scriptInput">Tema ou roteiro</label>
        <textarea id="scriptInput" placeholder="Ex: Buracos negros, IA criando vídeos, mistérios do universo..."></textarea>

        <div class="control-grid">
          <label>
            Duração
            <select id="durationSelect">
              <option value="10">10 segundos</option>
              <option value="15" selected>15 segundos</option>
              <option value="30">30 segundos</option>
            </select>
          </label>

          <label>
            Fonte de mídia
            <select id="mediaProvider">
              <option value="auto" selected>Automático grátis</option>
              <option value="wikimedia">Wikimedia grátis</option>
              <option value="openverse">Openverse grátis</option>
              <option value="nasa">NASA grátis</option>
              <option value="local">Visual local</option>
            </select>
          </label>
        </div>

        <p class="note">Narração grátis disponível pelo navegador. O GitHub Pages não consegue exportar essa voz dentro do vídeo sem backend/API TTS.</p>

        <div class="actions wrap">
          <button id="generateBtn" class="primary" type="button">Gerar roteiro e vídeo</button>
          <button id="mediaBtn" class="secondary" type="button">Buscar mídias</button>
          <button id="voiceBtn" class="secondary" type="button">Narrar grátis</button>
          <button id="captionBtn" class="secondary" type="button">Legendas</button>
          <button id="exportBtn" class="secondary" type="button">Exportar sem voz</button>
        </div>
      </section>

      <section class="status-grid">
        <button class="feature-card" id="featureMedia" type="button">
          <span>🌐</span>
          <p>Wikimedia, Openverse e NASA</p>
        </button>
        <button class="feature-card" id="featureVoice" type="button">
          <span>🎙️</span>
          <p>Voz grátis do navegador</p>
        </button>
        <button class="feature-card" id="featureCaptions" type="button">
          <span>💬</span>
          <p>Legendas automáticas</p>
        </button>
        <button class="feature-card" id="featureExport" type="button">
          <span>📲</span>
          <p>Exportar WebM sem voz</p>
        </button>
      </section>

      <section class="preview-card">
        <div class="preview-header">
          <p>Prévia 9:16</p>
          <span id="videoStatus">Aguardando roteiro</span>
        </div>

        <div class="video-frame" id="videoFrame">
          <img id="sceneImage" alt="Imagem da cena" />
          <video id="sceneVideo" muted loop playsinline></video>
          <div class="gradient"></div>
          <div class="caption" id="captionText">Digite um tema para gerar o vídeo.</div>
        </div>

        <canvas id="renderCanvas" width="720" height="1280"></canvas>
        <div class="timeline" id="timeline"></div>
      </section>

      <section class="script-output">
        <div class="section-title">
          <h2>Roteiro gerado</h2>
          <button id="copyBtn" class="mini-btn" type="button">Copiar</button>
        </div>
        <textarea id="scriptOutput" class="output-area">Seu roteiro aparecerá aqui.</textarea>
      </section>

      <section class="script-output media-panel">
        <div class="section-title">
          <h2>Mídias encontradas</h2>
          <span id="mediaSource">Automático grátis</span>
        </div>
        <div id="mediaGrid" class="media-grid"></div>
      </section>

      <nav class="bottom-nav">
        <button class="active" data-tab="home" type="button">Início</button>
        <button data-tab="projects" type="button">Projetos</button>
        <button data-tab="voices" type="button">Vozes</button>
        <button data-tab="settings" type="button">Ajustes</button>
      </nav>
    </section>
  </main>

  <script src="app.js?v=7"></script>
</body>
</html>
